name: Build

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Lint
        uses: ./.github/actions/lint
        with:
          check-commits: ${{ github.event_name == 'pull_request' }}

      - name: Test
        uses: ./.github/actions/test

      - name: Build
        uses: ./.github/actions/build

  package-attest:
    name: Package and attest npm tarball
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      attestations: write
      artifact-metadata: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Build
        uses: ./.github/actions/build

      - name: Pack package tarball
        id: pack
        uses: ./.github/actions/pack-package
        with:
          artifacts-dir: artifacts

      - name: Upload and attest package artifact
        uses: ./.github/actions/attest-artifacts
        with:
          artifact-name: npm-package
          subject-path: ${{ steps.pack.outputs.tarball-path }}
          enable-attestation: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}

      - name: Clean up
        run: rm -rf artifacts
        shell: bash
