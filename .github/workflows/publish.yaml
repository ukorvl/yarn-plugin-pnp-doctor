name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-24.04 # pinned for determinism

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Lint
        uses: ./.github/actions/lint
        with:
          check-commits: false

      - name: Build everything
        uses: ./.github/actions/build

      - name: Test
        uses: ./.github/actions/test
        with:
          upload-coverage: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack library tarball
        id: pack-lib
        uses: ./.github/actions/pack-lib
        with:
          artifacts-dir: artifacts

      - name: Generate SBOM
        run: |
          npm sbom --prefix lib --sbom-format cyclonedx --sbom-type library > artifacts/library.sbom.cdx.json
        shell: bash

      - name: Upload and attest package artifacts
        uses: ./.github/actions/attest-artifacts
        with:
          artifact-name: lib-package
          subject-path: ${{ steps.pack-lib.outputs.tarball-path }}
          sbom-path: artifacts/library.sbom.cdx.json

      - name: Publish tarball to npm
        run: npm publish "${{ steps.pack-lib.outputs.tarball-path }}" --provenance --access public
        shell: bash

      - name: Clean up
        run: rm -rf artifacts
        shell: bash
