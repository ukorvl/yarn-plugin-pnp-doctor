name: "TypeScript readiness"
description: "Run type checks with a target TypeScript version"

inputs:
  typescript-version:
    description: "TypeScript version tag to use, such as latest or rc"
    required: true

runs:
  using: "composite"
  steps:
    - name: Typecheck with TypeScript ${{ inputs.typescript-version }}
      env:
        TYPESCRIPT_VERSION: ${{ inputs.typescript-version }}
      run: yarn dlx --package "typescript@${TYPESCRIPT_VERSION}" tsc --noEmit
      shell: bash
