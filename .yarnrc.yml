approvedGitRepositories:
  - "**"

enableScripts: true

nodeLinker: pnp

packageExtensions:
  "@commitlint/load@*":
    dependencies:
      "@types/node": ^24.0.0
      typescript: 6.0.3
  eslint-plugin-perfectionist@*:
    dependencies:
      typescript: 6.0.3

yarnPath: .yarn/releases/yarn-4.14.1.cjs

npmMinimalAgeGate: 10080 # 7 days
